name: Daily Soil Moisture Predictions Update

on:
  schedule:
    # Run every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run pipeline and update predictions.json
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python dump_predictions.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add web/public/predictions.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily soil moisture predictions" && git push)
